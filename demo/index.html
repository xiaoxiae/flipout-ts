<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipOut geodesic demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a22;
        color: #f0f0f0;
        font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: fixed;
        top: 16px;
        left: 16px;
        max-width: 460px;
        pointer-events: none;
        z-index: 10;
      }
      #overlay h1 {
        margin: 0 0 6px 0;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3;
      }
      #overlay p {
        margin: 4px 0;
        font-size: 13px;
        line-height: 1.4;
        opacity: 0.92;
      }
      #overlay #status {
        font-variant-numeric: tabular-nums;
      }
      #overlay #subtitle {
        opacity: 0.6;
        font-size: 12px;
      }
      #controls {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #controls > * {
        pointer-events: auto;
      }
      #reset,
      #mesh,
      #obj-button,
      #animate {
        padding: 6px 12px;
        font-size: 13px;
        background: #2c2c38;
        color: #f0f0f0;
        border: 1px solid #44445a;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
      }
      #reset:hover,
      #mesh:hover,
      #obj-button:hover,
      #animate:hover:not(:disabled) {
        background: #3a3a4a;
      }
      #reset:active,
      #obj-button:active,
      #animate:active:not(:disabled) {
        background: #2c2c38;
      }
      #animate:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #obj-input {
        display: none;
      }
      #wireframe-row {
        margin-top: 6px;
        display: flex;
        gap: 6px;
        align-items: center;
        font-size: 13px;
        pointer-events: auto;
      }
      #footer {
        position: fixed;
        bottom: 12px;
        right: 16px;
        font-size: 12px;
        line-height: 1.5;
        opacity: 0.55;
        text-align: right;
        z-index: 10;
      }
      #footer a {
        color: #cfd0e2;
        text-decoration: none;
        border-bottom: 1px dotted #6b6c80;
      }
      #footer a:hover {
        opacity: 1;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>FlipOut geodesic demo &mdash; click two points on the mesh</h1>
      <p id="status">Click to set source.</p>
      <div id="controls">
        <select id="mesh">
          <option value="teapot">Utah teapot (1601 V)</option>
          <option value="icosphere">Icosphere (42 V)</option>
          <option value="icosahedron">Icosahedron (12 V)</option>
          <option value="cube">Cube (8 V)</option>
          <option value="grid">Flat grid (16 V)</option>
        </select>
        <button id="obj-button" type="button">Load OBJ...</button>
        <input id="obj-input" type="file" accept=".obj" />
        <button id="animate" type="button" disabled>Animate</button>
        <button id="reset">Reset</button>
      </div>
      <div id="wireframe-row">
        <input id="wireframe" type="checkbox" />
        <label for="wireframe">Wireframe overlay</label>
        &nbsp;&nbsp;
        <input id="path-points" type="checkbox" />
        <label for="path-points">Path points</label>
      </div>
      <p id="subtitle">Drag to orbit, scroll to zoom.</p>
    </div>
    <div id="footer">
      made by <a href="https://slama.dev">Tomáš Slama</a> &middot;
      based on <a href="https://nmwsharp.com/media/papers/flip-geodesics/flip_geodesics.pdf">Sharp &amp; Crane 2020</a><br />
      <a href="https://github.com/xiaoxiae/flipout-ts">github.com/xiaoxiae/flipout-ts</a>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
