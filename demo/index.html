<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipOut geodesic demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a22;
        color: #f0f0f0;
        font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: fixed;
        top: 16px;
        left: 16px;
        max-width: 460px;
        pointer-events: none;
        z-index: 10;
      }
      #overlay h1 {
        margin: 0 0 6px 0;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3;
      }
      #overlay p {
        margin: 4px 0;
        font-size: 13px;
        line-height: 1.4;
        opacity: 0.92;
      }
      #overlay #status {
        font-variant-numeric: tabular-nums;
      }
      #overlay #subtitle {
        opacity: 0.6;
        font-size: 12px;
      }
      #controls {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #controls > * {
        pointer-events: auto;
      }
      #reset,
      #mesh {
        padding: 6px 12px;
        font-size: 13px;
        background: #2c2c38;
        color: #f0f0f0;
        border: 1px solid #44445a;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
      }
      #reset:hover,
      #mesh:hover {
        background: #3a3a4a;
      }
      #reset:active {
        background: #2c2c38;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>FlipOut geodesic demo &mdash; click two points on the mesh</h1>
      <p id="status">Click to set source.</p>
      <div id="controls">
        <select id="mesh">
          <option value="teapot">Utah teapot (1601 V)</option>
          <option value="icosphere">Icosphere (42 V)</option>
          <option value="icosahedron">Icosahedron (12 V)</option>
          <option value="cube">Cube (8 V)</option>
          <option value="grid">Flat grid (16 V)</option>
        </select>
        <button id="reset">Reset</button>
      </div>
      <p id="subtitle">Drag to orbit, scroll to zoom.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
